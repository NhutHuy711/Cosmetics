<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head th:replace="fragments :: page_head('Promotions - Cosmetics Admin', 'none')" />

<body>
<div th:replace="navigation :: top_nav"></div>
<div class="main-wrapper">
    <div th:replace="navigation :: menu"></div>

    <!-- main content -->
    <main class="main-content-wrapper bg-white">
        <div class="container">
            <!-- header -->
            <div class="row mb-8">
                <div class="col-md-12">
                    <div class="d-md-flex justify-content-between align-items-center">
                        <div class="d-flex align-items-center gap-2">
                            <h2 class="mb-0">Promotions</h2>
                        </div>
                        <div>
                            <a class="btn btn-primary" th:href="@{/promotions/new}">
                                <i class="bi bi-plus-lg"></i> New Promotion
                            </a>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Search and Table -->
            <div class="row">
                <div class="col-xl-12 col-12 mb-5">
                    <div class="card h-100 card-lg">
                        <!-- Search Form -->
                        <div class="p-4">
                            <div th:replace="fragments :: search_form_and_message" />
                        </div>

                        <!-- Table -->
                        <div class="card-body p-0">
                            <div class="table-responsive">
                                <table class="table table-centered table-hover text-nowrap table-borderless mb-0">
                                    <thead class="bg-light">
                                    <tr>
                                        <th th:replace="fragments :: column_link('id', 'ID', 'none')"></th>
                                        <th th:replace="fragments :: column_link('name', 'Name', 'none')"></th>
                                        <th th:replace="fragments :: column_link('percentOff', 'Percent', 'none')"></th>
                                        <th th:replace="fragments :: column_link('startAt', 'Start', 'none')"></th>
                                        <th th:replace="fragments :: column_link('endAt', 'End', 'none')"></th>
                                        <th th:replace="fragments :: column_link('enabled', 'Enabled', 'none')"></th>
                                        <th class="text-dark">Actions</th>
                                    </tr>
                                    </thead>
                                    <tbody class="text-dark">
                                    <tr th:each="promotion : ${listPromotions}">
                                        <td>[[${promotion.id}]]</td>
                                        <td>
                                            <a th:href="@{'/promotions/detail/' + ${promotion.id}}" class="text-reset link-detail-promotion">
                                                [[${promotion.name}]]
                                            </a>
                                        </td>
                                        <td>
                                            [[${#numbers.formatDecimal(promotion.percentOff, 1, 2)}]]%
                                        </td>
                                        <td>
                                            <span class="text-muted" th:text="${promotion.startAt}"></span>
                                        </td>
                                        <td>
                                            <span class="text-muted" th:text="${promotion.endAt}"></span>
                                        </td>
                                        <td>
                                            <div th:replace="fragments :: status(${promotion.enabled}, 'promotion', '/promotions/' + ${promotion.id})" />
                                        </td>
                                        <td>
                                            <div class="d-flex gap-2">
                                                <a class="btn btn-light btn-icon-text link-detail-promotion"
                                                   th:href="@{'/promotions/detail/' + ${promotion.id}}"
                                                   data-bs-toggle="tooltip"
                                                   data-bs-placement="top"
                                                   title="View details">
                                                    <i class="bi bi-eye"></i>
                                                </a>
                                                <a class="btn btn-light btn-icon-text" th:href="@{'/promotions/edit/' + ${promotion.id} }"
                                                   data-bs-toggle="tooltip" data-bs-placement="top" title="Edit">
                                                    <i class="bi bi-pencil fs-5"></i>
                                                </a>
                                            </div>
                                        </td>
                                    </tr>
                                    </tbody>
                                </table>
                            </div>
                            <div th:replace="fragments :: pagination('promotions')"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>
</div>

<!-- Modal detail -->
<div class="modal fade" id="detailModal">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <!-- content load via ajax -->
    </div>
</div>

<div th:replace="fragments :: common-js"></div>
<div th:replace="fragments :: footer"></div>
<div th:replace="modal_fragments :: confirm_modal"></div>

<script type="text/javascript" th:src="@{/js/common_list.js}"></script>
<script type="text/javascript" th:src="@{/js/common.js}"></script>
<script type="text/javascript">
    moduleURL = "[[@{/promotions}]]";

    $(document).ready(function() {
        var message = "[[${message}]]";
        if (message) {
            showSuccessMessage(message);
        }
        handleDeleteLink();
        handlePromotionDetailLink();
    });

    function handleDeleteLink() {
        $(".link-delete").on("click", function (e) {
            showSuccessMessage($(this), 'promotion');
        });
    }

    function handlePromotionDetailLink() {
        $(".link-detail-promotion").on("click", function(e) {
            e.preventDefault();
            linkDetailURL = $(this).attr("href");
            $("#detailModal").modal("show").find(".modal-dialog").load(linkDetailURL);
        });
    }
</script>
</body>
</html>
