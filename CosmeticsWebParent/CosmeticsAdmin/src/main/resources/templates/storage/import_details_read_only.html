<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<body>
	<div th:fragment="content" th:remove="tag">
		<div class="table-responsive">
			<table class="table table-centered table-hover text-nowrap table-borderless mb-0">
				<thead class="bg-light">
					<tr>
						<th class="py-3">Variant ID</th>
						<th class="py-3">Product Variant</th>
						<th class="py-3">Quantity</th>
						<th class="py-3">Cost</th>
						<th class="py-3">Subtotal</th>
					</tr>
				</thead>
				<tbody>
					<tr th:each="detail: ${import.details}">
						<td class="align-middle">[[${detail.productVariant.id}]]</td>
						<td>
							<div class="d-flex align-items-center py-2">
								<div class="position-relative">
									<img th:src="@{${detail.productVariant.mainImagePath}}"
										 alt="Product Image" 
										 style="width: 60px; height: 60px; object-fit: cover;"
										 class="rounded"/>
								</div>
								<div class="ms-3">
                                    <h6 class="mb-0" th:title="${detail.productVariant.name}"
                                        th:text="${#strings.length(detail.productVariant.name) > 30
              ? #strings.substring(detail.productVariant.name,0,8) + '...' + #strings.substring(detail.productVariant.name, #strings.length(detail.productVariant.name)-8)
              : detail.productVariant.name}">
                                    </h6>

                                    <span class="text-muted small">ID: #[[${detail.productVariant.id}]]</span>
								</div>
							</div>
						</td>
						<td class="align-middle">[[${detail.quantity}]]</td>
						<td class="align-middle">$[[${#numbers.formatDecimal(detail.cost, 0, 'COMMA', 2, 'POINT')}]]</td>
						<td class="align-middle">$[[${#numbers.formatDecimal(detail.quantity * detail.cost, 0, 'COMMA', 2, 'POINT')}]]</td>
					</tr>
				</tbody>
			</table>
		</div>
	</div>
</body>

</html>
