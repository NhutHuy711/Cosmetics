    <script th:inline="javascript">
        document.addEventListener("DOMContentLoaded", function() {
            const contextPath = [[${#httpServletRequest.getContextPath()}]];
            const selects = document.querySelectorAll(".optionValueSelect");
            const isEdit = /*[[${#strings.contains(pageTitle, 'Edit Product')}]]*/ false;

            selects.forEach(select => {
                const typeId = select.dataset.typeId;
                fetch(`${contextPath}/options/api/${typeId}`)
                    .then(res => res.json())
                    .then(values => {
                        // ✅ Nếu đang edit → không thêm "-- Select Value --"
                        if (!isEdit) {
                            select.innerHTML = '<option value="">-- Select Value --</option>';
                        } else {
                            select.innerHTML = '';
                        }

                        values.forEach(v => {
                            const opt = document.createElement('option');
                            opt.value = v.id;
                            opt.textContent = v.value;
                            select.appendChild(opt);
                        });
                    })
                    .catch(err => {
                        console.error("Error loading values for type " + typeId, err);
                        select.innerHTML = '<option value="">(Error loading values)</option>';
                    });
            });
        });

    </script>
    <script th:inline="javascript">
        const contextPath = /*[[${#httpServletRequest.getContextPath()}]]*/ '';
    </script>
    <script>
        (function () {
            function normalizeAlias(str) {
                return (str || "")
                    .normalize("NFD").replace(/[\u0300-\u036f]/g, "")
                    .trim()
                    .replace(/\s*-\s*/g, "_")
                    .replace(/\s+/g, "_")
                    .replace(/[^a-zA-Z0-9_]/g, "");
            }

            window.updateVariantName = function () {
                const productSelect = document.getElementById("productSelect");
                const variantNameInput = document.getElementById("variantName");
                const variantAliasInput = document.getElementById("variantAlias");
                const selects = document.querySelectorAll(".optionValueSelect");

                // Edit/View không có select => thoát an toàn
                if (!productSelect || !variantNameInput || !variantAliasInput) return;

                const productText = productSelect.options[productSelect.selectedIndex]?.text || "";
                const parts = [productText.trim()].filter(Boolean);

                selects.forEach(s => {
                    const valText = s.options[s.selectedIndex]?.text;
                    if (valText && valText !== "-- Select Value --") parts.push(valText.trim());
                });

                const name = parts.join(" - ");
                variantNameInput.value = name;
                variantAliasInput.value = normalizeAlias(name);
            };

            window.updateProductInfo = async function () {
                const productSelect = document.getElementById("productSelect");
                if (!productSelect) return;

                const id = productSelect.value;
                const categoryInput = document.getElementById("categoryName");
                const brandInput = document.getElementById("brandName");

                if (!id) {
                    if (categoryInput) categoryInput.value = "";
                    if (brandInput) brandInput.value = "";
                    return;
                }

                try {
                    const res = await fetch(`${contextPath}/products/api/${id}`, {
                        method: "GET",
                        headers: { "Accept": "application/json" }
                    });

                    if (!res.ok) throw new Error(`HTTP ${res.status}`);

                    const data = await res.json();
                    if (categoryInput) categoryInput.value = data.category || "";
                    if (brandInput) brandInput.value = data.brand || "";
                } catch (e) {
                    console.error("Failed to load product info:", e);
                    if (categoryInput) categoryInput.value = "";
                    if (brandInput) brandInput.value = "";
                }
            };

            document.addEventListener("DOMContentLoaded", function () {
                const productSelect = document.getElementById("productSelect");
                const selects = document.querySelectorAll(".optionValueSelect");

                if (productSelect) {
                    productSelect.addEventListener("change", function () {
                        window.updateProductInfo();
                        window.updateVariantName();
                    });
                }

                selects.forEach(s => s.addEventListener("change", window.updateVariantName));

                // set initial values when load
                window.updateProductInfo();
                window.updateVariantName();
            });
        })();
    </script>
    <script>
        async function checkVariantDuplicate(form) {
            const productSelect = document.getElementById("productSelect");
            const productId = productSelect ? productSelect.value : null;

            // Edit: productSelect không có -> lấy hidden
            const hiddenProduct = form.querySelector('input[name="product"]');
            const resolvedProductId = productId || (hiddenProduct ? hiddenProduct.value : null);

            const optionSelects = document.querySelectorAll('select.optionValueSelect[name="optionValueIds"]');
            const optionValueIds = Array.from(optionSelects)
                .map(s => s.value)
                .filter(v => v !== "");

            if (!resolvedProductId) {
                return { ok: false, message: "Please select a product." };
            }

            // Nếu bạn muốn bắt buộc chọn đủ option trước khi save:
            // if (optionValueIds.length !== optionSelects.length) {
            //   return { ok: false, message: "Please select all option values before saving." };
            // }

            if (optionValueIds.length === 0) {
                return { ok: true };
            }

            const params = new URLSearchParams();
            params.set("productId", resolvedProductId);
            optionValueIds.forEach(id => params.append("optionValueIds", id));

            const idField = form.querySelector('input[name="id"]');
            if (idField && idField.value) params.set("variantId", idField.value);

            try {
                const res = await fetch(`${contextPath}/productVariants/api/check-duplicate?` + params.toString(), {
                    headers: { "Accept": "application/json" }
                });
                if (!res.ok) throw new Error("HTTP " + res.status);

                const data = await res.json();
                if (data.duplicate) {
                    return { ok: false, message: "This variant already exists for the selected product/options." };
                }

                return { ok: true };
            } catch (e) {
                console.error("Duplicate check failed:", e);
                // Nếu API lỗi: cho save tiếp (server-side vẫn nên chặn)
                return { ok: true };
            }
        }

        document.addEventListener("DOMContentLoaded", function () {
            const form = document.getElementById("variantForm");
            if (!form) return;

            form.addEventListener("submit", async function (e) {
                e.preventDefault(); // chặn submit mặc định (không chuyển trang)

                // clear lỗi cũ nếu bạn có hàm (tuỳ bạn)
                // clearErrorMessage && clearErrorMessage();

                const result = await checkVariantDuplicate(form);

                if (!result.ok) {
                    if (typeof showErrorMessage === "function") {
                        showErrorMessage(result.message);
                    } else {
                        // fallback nếu chưa load common_toast.js
                        alert(result.message);
                    }
                    return; // không submit
                }

                // pass -> submit thật
                form.submit();
            });
        });
    </script>
