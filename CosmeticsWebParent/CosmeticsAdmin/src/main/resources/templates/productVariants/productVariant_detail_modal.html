<div class="modal-content border-0">
	<div class="modal-header border-0">
		<h4 class="modal-title">Product Details</h4>
		<button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
	</div>

	<div class="modal-body px-4">
		<!-- Navigation Tabs -->
		<ul class="nav nav-pills nav-lb-tab mb-4" id="productDetailTabs" role="tablist">
            <li class="nav-item" role="presentation">
                <button class="nav-link active" id="attributes-tab" data-bs-toggle="tab"
                        data-bs-target="#attributes" type="button" role="tab"
                        aria-controls="attributes" aria-selected="true">
                    Attributes
                </button>
            </li>
			<li class="nav-item" role="presentation">
				<button class="nav-link" id="overview-tab" data-bs-toggle="tab"
						data-bs-target="#overview" type="button" role="tab"
						aria-controls="overview" aria-selected="true">
					Overview
				</button>
			</li>

<!--				<button class="nav-link" id="description-tab" data-bs-toggle="tab"-->

<!--						aria-controls="description" aria-selected="false">-->
<!--					Description-->
<!--				</button>-->
<!--			</li>-->
			<li class="nav-item" role="presentation">
				<button class="nav-link" id="images-tab" data-bs-toggle="tab"
						data-bs-target="#images" type="button" role="tab"
						aria-controls="images" aria-selected="false">
					Images
				</button>
			</li>

<!--				</button>-->
<!--			</li>-->
		</ul>

		<!-- Tab Content -->
		<div class="tab-content" id="productDetailTabsContent">

            <div class="tab-pane fade show active" id="attributes" role="tabpanel" aria-labelledby="attributes-tab">
                <div class="row g-4">
                    <!-- Product -->
                    <div class="row g-4">
                        <div class="col-md-6">
                            <label class="form-label">Product <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" th:value="${productVariant.product.name}" readonly />
                        </div>
                    </div>

                    <!-- Options -->
                    <div id="optionsContainer" class="row g-4 mt-2"
                         th:if="${!#maps.isEmpty(productVariant.optionTypeValueMap)}">

                        <th:block th:each="e : ${productVariant.optionTypeValueMap}">
                            <div class="col-md-6">
                                <label class="form-label" th:text="${e.key} + ' Value:'"></label>
                                <input type="text" class="form-control" th:value="${e.value}" readonly />
                            </div>
                        </th:block>
                    </div>

                </div>
            </div>
			<!-- Overview Tab -->
			<div class="tab-pane fade" id="overview" role="tabpanel" aria-labelledby="overview-tab">
				<div class="card shadow-sm border-0">
					<div class="card-body">
						<div class="row g-4">
							<!-- Title -->
							<div class="col-md-6">
								<label class="form-label">Name</label>
								<input type="text" class="form-control" th:value="${productVariant.name}" readonly />
							</div>

							<!-- Product Category -->
							<div class="col-md-6">
								<label class="form-label">Product Category</label>
								<input type="text" class="form-control" th:value="${productVariant.product.category.name}" readonly />
							</div>

							<!-- Alias -->
							<div class="col-md-6">
								<label class="form-label">Alias</label>
								<input type="text" class="form-control" th:value="${productVariant.alias}" readonly />
							</div>

							<!-- Brand -->
							<div class="col-md-6">
								<label class="form-label">Brand</label>
								<input type="text" class="form-control" th:value="${productVariant.product.brand.name}" readonly />
							</div>

                            <!--					 Cost-->
                            <div class="col-md-6">
                                <label class="form-label">Cost <span class="text-danger">*</span></label>
                                <div class="form-group">
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">$</span>
                                        <input type="number"
                                               class="form-control validate-field"
                                               placeholder="Enter cost"
                                               step="0.01"
                                               readonly
                                               th:value="${productVariant.cost}"/>
                                    </div>
                                </div>
                            </div>

                            <!--					 Price-->
                            <div class="col-md-6">
                                <label class="form-label">Price <span class="text-danger">*</span></label>
                                <div class="form-group">
                                    <div class="input-group">
                                        <span class="input-group-text bg-light">$</span>
                                        <input type="number"
                                               class="form-control"
                                               id="price"
                                               placeholder="Enter price"
                                               step="0.01"
                                               min="0"
                                               readonly
                                               th:value="${productVariant.price}"/>
                                    </div>
                                </div>
                            </div>

							<!-- Cost -->
<!--							<div class="col-md-6">-->
<!--								<label class="form-label">Cost</label>-->
<!--								<div class="input-group">-->
<!--									<span class="input-group-text bg-light">$</span>-->
<!--									<input type="text" class="form-control" th:value="${product.cost}" readonly />-->
<!--								</div>-->
<!--							</div>-->

							<!-- Price -->
<!--							<div class="col-md-6">-->
<!--								<label class="form-label">Price</label>-->
<!--								<div class="input-group">-->
<!--									<span class="input-group-text bg-light">$</span>-->
<!--									<input type="text" class="form-control" th:value="${product.price}" readonly />-->
<!--								</div>-->
<!--							</div>-->

							<!-- Sale Price -->
<!--							<div class="col-md-6">-->
<!--								<label class="form-label">Sale Price</label>-->
<!--								<div class="input-group">-->
<!--									<span class="input-group-text bg-light">$</span>-->
<!--									<input type="text" class="form-control" th:value="${product.discountPercent}" readonly />-->
<!--								</div>-->
<!--							</div>-->

							<!-- Status -->
							<div class="col-md-6">
								<label class="form-label">Status</label>
								<div class="form-check form-switch">
									<input class="form-check-input" type="checkbox" th:checked="${productVariant.enabled}" disabled>
									<label class="form-check-label">Enable this product variant</label>
								</div>
							</div>

							<!-- In Stock -->
<!--							<div class="col-md-6">-->
<!--								<label class="form-label">In Stock</label>-->
<!--								<input type="text" class="form-control" th:value="${product.inStock}" readonly />-->
<!--							</div>-->

							<!-- Updated Time -->
							<div class="col-md-6">
								<label class="form-label">Updated Time</label>
                                <input type="text" class="form-control"
                                       th:value="${#temporals.format(productVariant.updatedAt, 'yyyy-MM-dd HH:mm:ss')}" readonly />
                            </div>
						</div>
					</div>
				</div>
			</div>

			<!-- Description Tab -->
<!--			<div class="tab-pane fade" id="description" role="tabpanel" aria-labelledby="description-tab">-->
<!--				<div th:replace="products/product_description_read_only :: content"></div>-->
<!--			</div>-->

			<!-- Images Tab -->
			<div class="tab-pane fade" id="images" role="tabpanel" aria-labelledby="images-tab">
				<div th:replace="productVariants/productVariant_images_read_only :: content"></div>
			</div>

			<!-- Details Tab -->
<!--			<div class="tab-pane fade" id="details" role="tabpanel" aria-labelledby="details-tab">-->
<!--				<div th:replace="products/product_details_read_only :: content"></div>-->
<!--			</div>-->

			<!-- Shipping Tab -->

<!--			</div>-->
		</div>
	</div>

	<div class="modal-footer border-0">
		<button type="button" class="btn btn-light" data-bs-dismiss="modal">Close</button>
	</div>
</div>
