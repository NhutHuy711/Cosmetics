<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Order Invoice</title>
    <link href="https://maxcdn.bootstrapcdn.com/font-awesome/4.7.0/css/font-awesome.min.css" rel="stylesheet"/>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet"/>
    <style>
        body {
            margin-top: 20px;
            color: #484b51;
            font-family: Arial, sans-serif;
        }
        .text-secondary-d1 {
            color: #728299 !important;
        }
        .page-header {
            margin: 0 0 1rem;
            padding-bottom: 1rem;
            padding-top: .5rem;
            border-bottom: 1px dotted #e2e2e2;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .page-title {
            font-size: 1.75rem;
            font-weight: 300;
        }
        .mb-4 {
            margin-bottom: 1.5rem !important;
        }
        .text-grey-m2 {
            color: #888a8d !important;
        }
        .text-success-m2 {
            color: #86bd68 !important;
        }
        .font-bolder {
            font-weight: 600 !important;
        }
        .text-110 {
            font-size: 110% !important;
        }
        .text-blue {
            color: #478fcc !important;
        }
        .pb-25 {
            padding-bottom: .75rem !important;
        }
        .pt-25 {
            padding-top: .75rem !important;
        }
        hr {
            margin-top: 1rem;
            margin-bottom: 1rem;
            border: 0;
            border-top: 1px solid rgba(0, 0, 0, .1);
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-bottom: 1rem;
        }
        table th, table td {
            padding: 8px 12px;
            text-align: left;
        }
        table thead {
            background-color: #f3f8fa;
        }
        .summary {
            margin-top: 1rem;
        }
        .summary p {
            margin: 4px 0;
        }
        .text-left {
            text-align: left;
        }
    </style>
    <script>
        window.onload = function () {
            window.print();
        };
    </script>
</head>
<body class="container mt-4">
<div class="row">
    <div class="col-12">
        <div class="d-flex justify-content-between align-items-center mb-3">
            <h1 class="invoice-title">Invoice</h1>
            <h5>ID: #<span th:text="${order.id}"></span></h5>
        </div>

        <!-- Customer Info -->
        <div class="row mb-4">
            <div class="col-md-4">
                <h6>Customer</h6>
                <p th:text="${order.customer.fullName}"></p>
            </div>
            <div class="col-md-4">
                <h6>Address</h6>
                <p>
                    <span th:text="${order.customer.addressLine1}"></span><br/>
                    <span th:if="${order.customer.addressLine2}" th:text="${order.customer.addressLine2}"></span>
                    <span th:text="${order.customer.city} + ', ' + ${order.customer.state} + ', ' + ${order.customer.country.name}"></span>
                </p>
            </div>
            <div class="col-md-4">
                <h6>Phone Number</h6>
                <p th:text="${order.customer.phoneNumber}"></p>
            </div>
            <div class="col-md-4">
                <h6>Order Date</h6>
                <p th:text="${#dates.format(order.orderTime, 'dd/MM/yyyy HH:mm')}"></p>
            </div>
        </div>


        <div class="table-responsive">
            <table class="table table-bordered border-dark">
                <thead class="table table-bordered border-dark">
                <tr>
                    <th>#</th>
                    <th>Product</th>
                    <th class="text-end">Unit Price</th>
                    <th class="text-end">Quantity</th>
                    <th class="text-end">Subtotal</th>
                </tr>
                </thead>
                <tbody>
                <tr th:each="detail, iterStat : ${order.orderDetails}">
                    <td th:text="${iterStat.count}"></td>
                    <td th:text="${detail.variant.name}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(detail.unitPrice, 2, 'POINT', 2, 'COMMA')} + ' $'"></td>
                    <td class="text-end" th:text="${detail.quantity}"></td>
                    <td class="text-end" th:text="${#numbers.formatDecimal(detail.unitPrice * detail.quantity, 2, 'POINT', 2, 'COMMA')} + ' $'"></td>
                </tr>
                </tbody>
            </table>
        </div>

        <div class="row mt-4">
            <div class="col-sm-6">
                <p class="text-muted">Thank you for your order!</p>
            </div>
            <div class="col-sm-6">
                <table class="table borderless">
                    <tr>
                        <td class="text-end"><strong>Shipping Fee:</strong></td>
                        <td class="text-end" th:text="${#numbers.formatDecimal(order.shippingCost, 2, 'POINT', 2, 'COMMA')} + ' $'"></td>
                    </tr>
                    <tr>
                        <td class="text-end"><strong>Total:</strong></td>
                        <td class="text-end fw-bold text-success" th:text="${#numbers.formatDecimal(order.total, 2, 'POINT', 2, 'COMMA')} + ' $'"></td>
                    </tr>
                </table>
            </div>
        </div>
    </div>
</div>
</body>
</html>
